version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: video_ai_postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ai_user
      POSTGRES_PASSWORD: ai_password
      POSTGRES_DB: video_ai_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: video_ai_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: video_ai_api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://ai_user:ai_password@db:5432/video_ai_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    container_name: video_ai_worker
    command: celery -A app.core.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://ai_user:ai_password@db:5432/video_ai_db
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
